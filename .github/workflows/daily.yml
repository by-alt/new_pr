name: daily-pipeline

# Runs the pipeline every day and commits the updated database back to the repo,
# so the dataset grows on its own. Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write          # needed to commit the updated data back

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Job-level env so EVERY step (pipeline + alerts) can see these. Optional secrets
    # are simply empty when unset, and the features that use them degrade gracefully.
    env:
      REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      # Polite-fetch tuning (cloud IPs get blocked more — be extra gentle here).
      FETCH_MIN_DELAY_SECONDS: "6"
      FETCH_JITTER_SECONDS: "4"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the pipeline
        run: python scripts/run_all.py

      - name: Send anomaly alerts (only if a webhook is configured)
        if: ${{ env.ALERT_WEBHOOK_URL != '' }}
        run: python scripts/alerts.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/brand_health.db dashboard/web_data.json || git add -f data/brand_health.db
          git commit -m "data: daily update $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          # Rebase on any changes pushed since checkout so the push can't fail with a
          # non-fast-forward error, then push.
          git pull --rebase --autostash origin ${{ github.ref_name }} || true
          git push
